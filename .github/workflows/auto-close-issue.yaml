name: Auto Close Issue When All PRs Merged

on:
  pull-request:
    types: [closed]
    branches: [main]
  
jobs:
  check-and-close:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull_requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Find linked issues and check all PRs
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.github/scripts/auto-close-issue.js');
            await fn({ github, context });
