name: Auto Close Issue When All PRs Merged

on:
  pull_request_target:
    types: [closed]
    branches: [main]
  
jobs:
  check-and-close:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      contents: read

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Find linked issues and check all PRs
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/auto-close-issue.js');
            await script({ github, context });
